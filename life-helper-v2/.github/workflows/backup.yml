name: Backup Database

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backup from Railway
        id: download
        run: |
          mkdir -p backup
          RAILWAY_URL="${{ vars.RAILWAY_URL || 'https://life-helper-production.up.railway.app' }}"
          BACKUP_TOKEN="${{ secrets.BACKUP_TOKEN }}"
          
          HTTP_CODE=$(curl -s -o backup/life.db -w "%{http_code}" \
            -H "X-Backup-Token: ${BACKUP_TOKEN}" \
            "${RAILWAY_URL}/api/backup?token=${BACKUP_TOKEN}")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Backup downloaded successfully"
            echo "size=$(wc -c < backup/life.db)" >> $GITHUB_OUTPUT
          else
            echo "Download failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cp backup/life.db "backup/life-$(date +%Y%m%d).db"
          
          cd backup
          ls -t life-*.db 2>/dev/null | tail -n +31 | xargs -r rm
          cd ..
          
          git add backup/
          git diff --staged --quiet || git commit -m "chore: database backup $(date +%Y-%m-%d)"
          git push
