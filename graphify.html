<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e0e0e0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}
#canvas{display:block;cursor:grab}
#canvas:active{cursor:grabbing}
#sidebar{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:#1a1d27;border-left:1px solid #2a2d3a;transition:right .3s ease;z-index:100;overflow-y:auto;padding:24px}
#sidebar.open{right:0}
#sidebar h2{font-size:18px;margin-bottom:12px;color:#fff}
#sidebar .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:#888;font-size:20px;cursor:pointer}
#sidebar .close-btn:hover{color:#fff}
#sidebar .detail-section{margin-bottom:16px}
#sidebar .detail-section h3{font-size:13px;color:#8899aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
#sidebar .detail-section p{font-size:14px;line-height:1.6;color:#ccc}
#sidebar .tag{display:inline-block;background:#2a2d3a;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px;color:#aab}
#legend{position:fixed;bottom:20px;left:20px;background:rgba(26,29,39,.9);border:1px solid #2a2d3a;border-radius:8px;padding:16px;z-index:50;backdrop-filter:blur(8px)}
#legend h4{font-size:12px;color:#8899aa;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.legend-item{display:flex;align-items:center;margin-bottom:6px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;margin-right:8px}
#controls{position:fixed;top:20px;left:20px;z-index:50;display:flex;gap:8px}
#controls button{background:rgba(26,29,39,.9);border:1px solid #2a2d3a;color:#ccc;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;backdrop-filter:blur(8px)}
#controls button:hover{background:#2a2d3a;color:#fff}
#controls button.active{background:#3a3d4a;color:#fff;border-color:#5a5d6a}
#search{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:50}
#search input{background:rgba(26,29,39,.9);border:1px solid #2a2d3a;color:#ccc;padding:10px 20px;border-radius:20px;width:300px;font-size:14px;outline:none;backdrop-filter:blur(8px)}
#search input::placeholder{color:#666}
#search input:focus{border-color:#5a5d6a}
#tooltip{position:fixed;background:rgba(26,29,39,.95);border:1px solid #2a2d3a;padding:8px 12px;border-radius:6px;font-size:12px;pointer-events:none;z-index:200;display:none;max-width:250px;backdrop-filter:blur(8px)}
#layer-toggles{position:fixed;top:20px;right:20px;z-index:50;display:flex;flex-direction:column;gap:6px}
#layer-toggles button{background:rgba(26,29,39,.9);border:1px solid #2a2d3a;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;backdrop-filter:blur(8px);text-align:left}
#layer-toggles button:hover{background:#2a2d3a}
#layer-toggles button.active{border-color:#5a5d6a}
#stats{position:fixed;bottom:20px;right:20px;background:rgba(26,29,39,.9);border:1px solid #2a2d3a;border-radius:8px;padding:12px 16px;z-index:50;font-size:12px;color:#8899aa;backdrop-filter:blur(8px)}
</style>
</head>

const NODES = DATA.nodes;
const EDGES = DATA.edges;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let camera = { x: 0, y: 0, zoom: 0.7 };
let dragging = null;
let panning = false;
let panStart = { x: 0, y: 0 };
let hoveredNode = null;
let selectedNode = null;
let physicsEnabled = true;
let layers = { system: true, graph: true, domain: true };
let searchTerm = '';

const COLORS = {
  route: '#4a9eff', agent: '#34d399', data: '#f59e0b',
  domain: '#a78bfa', cbt: '#f472b6', faye: '#fb923c',
  infrastructure: '#94a3b8', graph: '#60a5fa',
};
const NODE_SIZE = 36;

function initPositions() {
  const cx = W / 2;
  const cy = H / 2;
  const layerGroups = { system: [], graph: [], domain: [] };
  NODES.forEach((n, i) => layerGroups[n.layer].push(i));
  let offsetY = -150;
  for (const [layer, indices] of Object.entries(layerGroups)) {
    indices.forEach((nid, i) => {
      const angle = (i / indices.length) * Math.PI * 2 - Math.PI / 2;
      const r = layer === 'system' ? 280 : layer === 'graph' ? 220 : 260;
      NODES[nid].x = cx + Math.cos(angle) * r;
      NODES[nid].y = cy + offsetY + Math.sin(angle) * r * 0.6;
      NODES[nid].vx = 0;
      NODES[nid].vy = 0;
    });
    offsetY += 180;
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camera.zoom + camera.x,
    y: (sy - H / 2) / camera.zoom + camera.y,
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - camera.x) * camera.zoom + W / 2,
    y: (wy - camera.y) * camera.zoom + H / 2,
  };
}

function getNodeAt(wx, wy) {
  for (let i = NODES.length - 1; i >= 0; i--) {
    const n = NODES[i];
    if (!layers[n.layer]) continue;
    const dx = wx - n.x;
    const dy = wy - n.y;
    if (dx * dx + dy * dy < NODE_SIZE * NODE_SIZE) return n;
  }
  return null;
}

function simulate() {
  if (!physicsEnabled) return;
  const alpha = 0.3;
  for (let i = 0; i < NODES.length; i++) {
    if (!layers[NODES[i].layer]) continue;
    for (let j = i + 1; j < NODES.length; j++) {
      if (!layers[NODES[j].layer]) continue;
      let dx = NODES[i].x - NODES[j].x;
      let dy = NODES[i].y - NODES[j].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = 8000 / (dist * dist);
      if (!NODES[i].pinned) { NODES[i].vx += (dx / dist) * force * alpha; NODES[i].vy += (dy / dist) * force * alpha; }
      if (!NODES[j].pinned) { NODES[j].vx -= (dx / dist) * force * alpha; NODES[j].vy -= (dy / dist) * force * alpha; }
    }
  }
  for (const [fromId, toId] of EDGES) {
    const from = NODES[fromId];
    const to = NODES[toId];
    if (!layers[from.layer] || !layers[to.layer]) continue;
    let dx = to.x - from.x;
    let dy = to.y - from.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let force = (dist - 200) * 0.01;
    if (!from.pinned) { from.vx += (dx / dist) * force * alpha; from.vy += (dy / dist) * force * alpha; }
    if (!to.pinned) { to.vx -= (dx / dist) * force * alpha; to.vy -= (dy / dist) * force * alpha; }
  }
  for (let i = 0; i < NODES.length; i++) {
    if (!layers[NODES[i].layer] || NODES[i].pinned) continue;
    NODES[i].vx += (W / 2 - NODES[i].x) * 0.0003;
    NODES[i].vy += (H / 2 - NODES[i].y) * 0.0003;
  }
  for (let i = 0; i < NODES.length; i++) {
    if (!layers[NODES[i].layer] || NODES[i].pinned) continue;
    NODES[i].vx *= 0.85;
    NODES[i].vy *= 0.85;
    NODES[i].x += NODES[i].vx;
    NODES[i].y += NODES[i].vy;
  }
}

function isConnectedTo(node, other) {
  if (!other) return true;
  for (const [fromId, toId] of EDGES) {
    if (NODES[fromId].id === node.id || NODES[toId].id === node.id) {
      if (NODES[fromId].id === other.id || NODES[toId].id === other.id) return true;
    }
  }
  return false;
}

function matchesSearch(node) {
  if (!searchTerm) return true;
  return node.label.toLowerCase().includes(searchTerm.toLowerCase()) ||
         node.desc.toLowerCase().includes(searchTerm.toLowerCase());
}

function drawEdge(from, to, label) {
  const s1 = worldToScreen(from.x, from.y);
  const s2 = worldToScreen(to.x, to.y);
  const isHighlighted = hoveredNode && (hoveredNode.id === from.id || hoveredNode.id === to.id);
  const isDimmed = hoveredNode && !isHighlighted;
  ctx.beginPath();
  ctx.moveTo(s1.x, s1.y);
  ctx.lineTo(s2.x, s2.y);
  ctx.strokeStyle = isDimmed ? 'rgba(100,100,120,0.08)' : isHighlighted ? 'rgba(255,255,255,0.5)' : 'rgba(100,100,120,0.2)';
  ctx.lineWidth = isHighlighted ? 2 : 1;
  ctx.stroke();
  const dx = s2.x - s1.x;
  const dy = s2.y - s1.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len > 0) {
    const ux = dx / len;
    const uy = dy / len;
    const ax = s2.x - ux * NODE_SIZE * camera.zoom;
    const ay = s2.y - uy * NODE_SIZE * camera.zoom;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - ux * 10 - uy * 5, ay - uy * 10 + ux * 5);
    ctx.lineTo(ax - ux * 10 + uy * 5, ay - uy * 10 - ux * 5);
    ctx.closePath();
    ctx.fillStyle = isDimmed ? 'rgba(100,100,120,0.08)' : isHighlighted ? 'rgba(255,255,255,0.5)' : 'rgba(100,100,120,0.2)';
    ctx.fill();
  }
  if (camera.zoom > 0.5 && !isDimmed) {
    const mx = (s1.x + s2.x) / 2;
    const my = (s1.y + s2.y) / 2;
    ctx.font = Math.max(9, 11 * camera.zoom) + 'px sans-serif';
    ctx.fillStyle = 'rgba(150,150,170,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText(label, mx, my - 5);
  }
}

function drawNode(node) {
  const s = worldToScreen(node.x, node.y);
  const r = NODE_SIZE * camera.zoom;
  const color = COLORS[node.type] || '#888';
  const isHovered = hoveredNode && hoveredNode.id === node.id;
  const isSelected = selectedNode && selectedNode.id === node.id;
  const isDimmed = (hoveredNode || searchTerm) && !isConnectedTo(node, hoveredNode) && !matchesSearch(node);
  if (isHovered || isSelected) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, r + 8, 0, Math.PI * 2);
    ctx.fillStyle = color + '30';
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.fillStyle = isDimmed ? '#1a1d27' : color + '20';
  ctx.fill();
  ctx.strokeStyle = isDimmed ? 'rgba(100,100,120,0.15)' : isSelected ? '#fff' : isHovered ? color : color + '80';
  ctx.lineWidth = isSelected ? 3 : isHovered ? 2 : 1;
  ctx.stroke();
  if (camera.zoom > 0.3) {
    ctx.font = 'bold ' + Math.max(10, 14 * camera.zoom) + 'px sans-serif';
    ctx.fillStyle = isDimmed ? '#444' : '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.label.charAt(0), s.x, s.y);
  }
  if (camera.zoom > 0.4 && !isDimmed) {
    ctx.font = Math.max(9, 12 * camera.zoom) + 'px sans-serif';
    ctx.fillStyle = '#ccc';
    ctx.textAlign = 'center';
    ctx.fillText(node.label, s.x, s.y + r + 14 * camera.zoom);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(50,50,60,0.3)';
  ctx.lineWidth = 1;
  const gridSize = 50 * camera.zoom;
  const offsetX = (W / 2 - camera.x * camera.zoom) % gridSize;
  const offsetY = (H / 2 - camera.y * camera.zoom) % gridSize;
  for (let x = offsetX; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = offsetY; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  simulate();
  for (const [fromId, toId, label] of EDGES) {
    if (!layers[NODES[fromId].layer] || !layers[NODES[toId].layer]) continue;
    drawEdge(NODES[fromId], NODES[toId], label);
  }
  for (const node of NODES) {
    if (!layers[node.layer]) continue;
    drawNode(node);
  }
  // Stats
  const statsEl = document.getElementById('stats');
  statsEl.textContent = NODES.length + ' 节点 | ' + EDGES.length + ' 边 | 缩放: ' + camera.zoom.toFixed(2) + 'x';
  requestAnimationFrame(render);
}

canvas.addEventListener('mousedown', e => {
  const w = screenToWorld(e.clientX, e.clientY);
  const node = getNodeAt(w.x, w.y);
  if (node) {
    dragging = node;
    node.pinned = true;
    selectedNode = node;
    openSidebar(node);
  } else {
    panning = true;
    panStart = { x: e.clientX, y: e.clientY };
    selectedNode = null;
    closeSidebar();
  }
});

canvas.addEventListener('mousemove', e => {
  const w = screenToWorld(e.clientX, e.clientY);
  const node = getNodeAt(w.x, w.y);
  hoveredNode = node;
  canvas.style.cursor = node ? 'pointer' : panning ? 'grabbing' : 'grab';
  if (dragging) { dragging.x = w.x; dragging.y = w.y; }
  else if (panning) {
    camera.x -= (e.clientX - panStart.x) / camera.zoom;
    camera.y -= (e.clientY - panStart.y) / camera.zoom;
    panStart = { x: e.clientX, y: e.clientY };
  }
  const tooltip = document.getElementById('tooltip');
  if (node && !selectedNode) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
    tooltip.textContent = node.label;
  } else { tooltip.style.display = 'none'; }
});

canvas.addEventListener('mouseup', () => {
  if (dragging) dragging.pinned = false;
  dragging = null;
  panning = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.1, Math.min(5, camera.zoom * zoomFactor));
  const w = screenToWorld(e.clientX, e.clientY);
  camera.zoom = newZoom;
  const w2 = screenToWorld(e.clientX, e.clientY);
  camera.x -= (w2.x - w.x);
  camera.y -= (w2.y - w.y);
}, { passive: false });

function resetView() {
  camera = { x: W / 2, y: H / 2, zoom: 0.7 };
  initPositions();
}

function togglePhysics() {
  physicsEnabled = !physicsEnabled;
  document.getElementById('physicsBtn').classList.toggle('active');
}

function toggleLayer(layer) {
  layers[layer] = !layers[layer];
  document.getElementById('btn-' + layer).classList.toggle('active');
}

function openSidebar(node) {
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('sidebar-content');
  const color = COLORS[node.type] || '#888';
  let html = '<div style="border-left:3px solid ' + color + ';padding-left:12px;margin-bottom:20px">';
  html += '<h2 style="color:' + color + '">' + node.label + '</h2>';
  html += '<p style="color:#8899aa;font-size:13px">' + node.desc + '</p></div>';
  if (node.details && Object.keys(node.details).length > 0) {
    html += '<div class="detail-section"><h3>详细信息</h3>';
    for (const [key, val] of Object.entries(node.details)) {
      if (Array.isArray(val)) {
        html += '<p><strong>' + key + ':</strong><br>';
        val.forEach(v => { html += '<span class="tag">' + v + '</span>'; });
        html += '</p>';
      } else if (typeof val === 'object') {
        html += '<p><strong>' + key + ':</strong><br>';
        for (const [k, v] of Object.entries(val)) {
          html += '<span class="tag">' + k + ': ' + v + '</span>';
        }
        html += '</p>';
      } else {
        html += '<p><strong>' + key + ':</strong> ' + val + '</p>';
      }
    }
    html += '</div>';
  }
  const connections = EDGES.filter(e => e[0] === node.id || e[1] === node.id);
  if (connections.length > 0) {
    html += '<div class="detail-section"><h3>连接 (' + connections.length + ')</h3>';
    for (const [fromId, toId, label] of connections) {
      const other = NODES[fromId].id === node.id ? NODES[toId] : NODES[fromId];
      html += '<p><span class="tag">' + label + '</span> <span class="tag" style="color:' + COLORS[other.type] + '">' + other.label + '</span></p>';
    }
    html += '</div>';
  }
  content.innerHTML = html;
  sidebar.classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
});

resize();
window.addEventListener('resize', () => { resize(); });
initPositions();
render();
</script>
